services:
  postgres:
    image: postgres:16
    networks:
      - autopulse-network
    container_name: autopulse-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: autopulse_admin
      POSTGRES_PASSWORD: autopulse_admin_pass
      POSTGRES_DB: autopulse_db
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./sql:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:

networks:
  autopulse-network:
    external: true
    name: autopulse-network