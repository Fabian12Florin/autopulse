services:
  geofabrik-download:
    image: alpine:3.20
    working_dir: /data
    volumes:
      - ./osrm-data:/data
    command: >
      sh -c "
      apk add --no-cache wget &&
      if [ ! -f /data/romania-latest.osm.pbf ]; then
        wget -O /data/romania-latest.osm.pbf https://download.geofabrik.de/europe/romania-latest.osm.pbf;
      else
        echo 'romania-latest.osm.pbf already exists';
      fi
      "

  osrm-extract:
    image: osrm/osrm-backend:latest
    container_name: osrm-extract
    depends_on:
      geofabrik-download:
        condition: service_completed_successfully
    volumes:
      - ./osrm-data:/data
    command: >
      osrm-extract -p /opt/car.lua /data/romania-latest.osm.pbf

  osrm-partition:
    image: osrm/osrm-backend:latest
    container_name: osrm-partition
    depends_on:
      osrm-extract:
        condition: service_completed_successfully
    volumes:
      - ./osrm-data:/data
    command: >
      osrm-partition /data/romania-latest.osrm

  osrm-customize:
    image: osrm/osrm-backend:latest
    container_name: osrm-customize
    depends_on:
      osrm-partition:
        condition: service_completed_successfully
    volumes:
      - ./osrm-data:/data
    command: >
      osrm-customize /data/romania-latest.osrm