spring.application.name=routing-service-test

spring.datasource.url=jdbc:h2:mem:routing_test;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=PUBLIC

eureka.client.enabled=false
spring.cloud.discovery.enabled=false
spring.cloud.openfeign.client.refresh-enabled=false

app.vroom.base-url=http://localhost:3000
app.vroom.request-output-dir=target/vroom-test
