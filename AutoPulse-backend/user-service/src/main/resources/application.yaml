server:
  port: ${SERVER_PORT:8084}

spring:
  application:
    name: user-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:postgres}?currentSchema=${DB_SCHEMA:user_service}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
        jdbc:
          time_zone: UTC

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    producer:
      acks: all
      retries: 3
      properties:
        spring.json.add.type.headers: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://localhost:8008/realms/autopulse}

eureka:
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka}
    register-with-eureka: true
    fetch-registry: true

  instance:
    prefer-ip-address: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

keycloak:
  admin:
    base-url: ${KEYCLOAK_BASE_URL:http://localhost:8008}
    realm: ${KEYCLOAK_REALM:autopulse}
    client-id: ${KEYCLOAK_ADMIN_CLIENT_ID:user-service-client}
    client-secret: ${KEYCLOAK_ADMIN_CLIENT_SECRET}
    admin-username: ${KEYCLOAK_ADMIN_USERNAME}
    admin-password: ${KEYCLOAK_ADMIN_PASSWORD}
    roles:
      admin: ${KEYCLOAK_ROLE_ADMIN:ADMIN}
      dispatcher: ${KEYCLOAK_ROLE_DISPATCHER:DISPATCHER}
      courier: ${KEYCLOAK_ROLE_COURIER:COURIER}

logging:
  level:
    org.springframework.security: INFO
    org.hibernate.SQL: INFO
    com.autopulse.userservice: INFO
