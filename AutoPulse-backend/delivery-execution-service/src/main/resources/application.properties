spring.application.name=delivery-execution-service

server.port=${DELIVERY_SERVER_PORT:8086}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${DELIVERY_DB_HOST}:${DELIVERY_DB_PORT}/${DELIVERY_DB_NAME}
spring.datasource.username=${DELIVERY_DB_USER}
spring.datasource.password=${DELIVERY_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=${DELIVERY_DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=Europe/Bucharest

eureka.client.enabled=true
spring.cloud.discovery.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}