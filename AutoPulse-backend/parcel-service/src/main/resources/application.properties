spring.application.name=parcel-service

server.port=${PARCEL_SERVER_PORT:8083}
server.address=0.0.0.0

spring.datasource.url=jdbc:postgresql://${PARCEL_DB_HOST}:${PARCEL_DB_PORT}/${DB_NAME}
spring.datasource.username=${PARCEL_DB_USER}
spring.datasource.password=${PARCEL_DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.properties.hibernate.default_schema=${DB_SCHEMA}
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jackson.time-zone=Europe/Bucharest

eureka.client.enabled=true
spring.cloud.discovery.enabled=true
eureka.client.register-with-eureka=true
eureka.client.fetch-registry=true
eureka.client.service-url.defaultZone=${EUREKA_URL:http://localhost:8761/eureka}
eureka.instance.prefer-ip-address=true

springdoc.api-docs.path=/v3/api-docs
scalar.enabled=true
scalar.url=/v3/api-docs
scalar.path=/scalar
scalar.pageTitle=Parcel Service API Documentation
scalar.description=API documentation for the Parcel Service application.

management.endpoints.web.exposure.include=health,info,metrics,prometheus
management.endpoint.health.show-details=always
management.metrics.tags.application=${spring.application.name}
