apiVersion: apps/v1
kind: Deployment
metadata:
  name: delivery-execution-service
  namespace: autopulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: delivery-execution-service
  template:
    metadata:
      labels:
        app: delivery-execution-service
    spec:
      containers:
        - name: delivery-execution-service
          image: crautopulsedev.azurecr.io/autopulse-delivery-execution-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8081
          envFrom:
            - configMapRef:
                name: autopulse-config
          env:
            - name: SERVER_PORT
              value: "8081"
            - name: DELIVERY_SERVER_PORT
              value: "8081"
            - name: DELIVERY_DB_USER
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: DELIVERY_DB_USER
            - name: DELIVERY_DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: DELIVERY_DB_PASSWORD
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: autopulse-config
                  key: DELIVERY_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: DELIVERY_DB_USER
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: DELIVERY_DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: delivery-execution-service
  namespace: autopulse
spec:
  selector:
    app: delivery-execution-service
  ports:
    - port: 8081
      targetPort: 8081
