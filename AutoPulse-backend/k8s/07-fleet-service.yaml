apiVersion: apps/v1
kind: Deployment
metadata:
  name: fleet-service
  namespace: autopulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: fleet-service
  template:
    metadata:
      labels:
        app: fleet-service
    spec:
      containers:
        - name: fleet-service
          image: crautopulsedev.azurecr.io/autopulse-fleet-service:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8083
          envFrom:
            - configMapRef:
                name: autopulse-config
          env:
            - name: PORT
              value: "8083"
            - name: DB_URL
              valueFrom:
                configMapKeyRef:
                  name: autopulse-config
                  key: FLEET_DB_URL
            - name: DB_USERNAME
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: FLEET_DB_USERNAME
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: FLEET_DB_PASSWORD
            - name: SPRING_DATASOURCE_URL
              valueFrom:
                configMapKeyRef:
                  name: autopulse-config
                  key: FLEET_DB_URL
            - name: SPRING_DATASOURCE_USERNAME
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: FLEET_DB_USERNAME
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: autopulse-secrets
                  key: FLEET_DB_PASSWORD
---
apiVersion: v1
kind: Service
metadata:
  name: fleet-service
  namespace: autopulse
spec:
  selector:
    app: fleet-service
  ports:
    - port: 8083
      targetPort: 8083
