spring:
  application:
    name: fleet-service

  kafka:
    bootstrap-servers: kafka:9092

  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: fleet_service

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fleet_service
    schemas: fleet_service
    clean-disabled: true

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: ${OAUTH2_ISSUER_URI:http://keycloak:8080/realms/autopulse}

eureka:
  client:
    serviceUrl:
      defaultZone: ${EUREKA_URL:http://discovery-service:8761/eureka}
    register-with-eureka: true
    fetch-registry: true
  instance:
    prefer-ip-address: true

fleet:
  expiration-notification:
    email: ${FLEET_EXPIRATION_NOTIFICATION_EMAIL:autopulse.endava@gmail.com}

logging:
  level:
    com.autopulse.fleet_service: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}