spring:
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: fleet_service

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fleet_service
    schemas: fleet_service
    clean-disabled: false

eureka:
  client:
    enabled: false

logging:
  level:
    com.autopulse.fleet_service: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG