spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        default_schema: fleet_service

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fleet_service
    schemas: fleet_service
    clean-disabled: false

  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:8008/realms/autopulse

fleet:
  expiration-notification:
    email: ${FLEET_EXPIRATION_NOTIFICATION_EMAIL:autopulse.endava@gmail.com}

logging:
  level:
    com.autopulse.fleet_service: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.flywaydb: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      show-details: always
  metrics:
    tags:
      application: ${spring.application.name}