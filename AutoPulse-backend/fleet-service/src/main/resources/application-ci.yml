server:
  port: ${PORT:8083}

spring:
  application:
    name: fleet-service

  datasource:
    url: ${SPRING_DATASOURCE_URL}
    username: ${SPRING_DATASOURCE_USERNAME}
    password: ${SPRING_DATASOURCE_PASSWORD}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        format_sql: false
        default_schema: fleet_service

  flyway:
    enabled: true
    locations: classpath:db/migration
    default-schema: fleet_service
    schemas: fleet_service
    clean-disabled: true

eureka:
  client:
    enabled: false

logging:
  level:
    com.autopulse.fleet_service: INFO
    org.springframework.web: INFO
    org.hibernate.SQL: WARN
    org.flywaydb: INFO