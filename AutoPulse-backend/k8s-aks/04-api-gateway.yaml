apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway
  namespace: autopulse
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: crautopulsedev.azurecr.io/autopulse-api-gateway:1.1
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "100m"
              memory: "256Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          envFrom:
            - configMapRef:
                name: autopulse-config
          env:
            - name: SPRING_APPLICATION_NAME
              value: api-gateway
            - name: GATEWAY_PORT
              value: "8080"
            - name: APP_CORS_ALLOWED_ORIGINS
              value: "http://134.112.2.85,http://20.215.97.1,http://localhost:3050,http://127.0.0.1:3050,http://localhost:5173"
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 45
            periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: api-gateway
  namespace: autopulse
spec:
  type: NodePort
  selector:
    app: api-gateway
  ports:
    - port: 8080
      targetPort: 8080
      nodePort: 30080
