<!doctype html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <title th:text="${subject}">AutoPulse Notification</title>
</head>
<body style="margin:0; padding:0; background-color:#f8fafc;">
<table role="presentation" width="100%" cellspacing="0" cellpadding="0" border="0" style="background-color:#f8fafc;">
    <tr>
        <td align="center" style="padding:24px 12px;">
            <table role="presentation" width="640" cellspacing="0" cellpadding="0" border="0"
                   style="width:640px; max-width:640px; background-color:#ffffff; border:1px solid #e2e8f0; border-radius:24px; overflow:hidden;">
                <tr>
                    <td style="padding:18px 24px; border-bottom:1px solid #e2e8f0; background-color:#0f172a;">
                        <div style="font-family:Arial, sans-serif; color:#ffffff; font-size:18px; font-weight:700; letter-spacing:-0.2px;">
                            AutoPulse
                        </div>
                        <div style="font-family:Arial, sans-serif; color:#cbd5e1; font-size:12px; margin-top:4px;">
                            Delivery platform notifications
                        </div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:28px 24px; font-family:Arial, sans-serif; color:#0f172a; line-height:1.6;">
                        <div th:utext="${contentHtml}">Content</div>
                    </td>
                </tr>

                <tr>
                    <td style="padding:18px 24px; border-top:1px solid #e2e8f0; background-color:#f8fafc;">
                        <div style="font-family:Arial, sans-serif; font-size:12px; color:#64748b; line-height:1.5;">
                            <div>This email was sent automatically by AutoPulse.</div>
                            <div style="margin-top:6px;">
                                Need help?
                                <a th:href="'mailto:' + ${supportEmail}"
                                   th:text="${supportEmail}"
                                   style="color:#2563eb; text-decoration:none;">support@example.com</a>
                            </div>
                            <div style="margin-top:8px; color:#94a3b8;">
                                © <span th:text="${year}">2026</span> AutoPulse. All rights reserved.
                            </div>
                        </div>
                    </td>
                </tr>
            </table>
        </td>
    </tr>
</table>
</body>
</html>
